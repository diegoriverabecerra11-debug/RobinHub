<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RobinHud | Feed de Inspiración</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <nav class="navbar">
        <div class="logo" onclick="location.reload()">Robin<span>Hud</span></div>
        <div class="search-bar">
            <i data-lucide="search"></i>
            <input type="text" placeholder="Buscar cafés, paisajes, deportes...">
        </div>
        <div class="nav-icons" id="navActions">
            <button class="btn-login" onclick="abrirModal('authModal')">Entrar</button>
            <button class="btn-signup" onclick="abrirModal('authModal')">Registrarse</button>
        </div>
    </nav>

    <main class="feed" id="mainFeed">
        </main>

    <div id="authModal" class="modal-overlay">
        <div class="modal-content auth-box">
            <span class="close" onclick="cerrarModal('authModal')">&times;</span>
            <div class="logo">Robin<span>Hud</span></div>
            <div class="auth-tabs">
                <button class="tab-btn active" id="tabLogin">Entrar</button>
                <button class="tab-btn" id="tabRegister">Registrarse</button>
            </div>
            <form id="loginForm" class="auth-form active">
                <input type="email" id="loginEmail" placeholder="Correo electrónico" required>
                <input type="password" id="loginPass" placeholder="Contraseña" required>
                <button type="submit" class="btn-signup">Entrar</button>
            </form>
            <form id="registerForm" class="auth-form">
                <input type="text" id="regUser" placeholder="Nombre de usuario" required>
                <input type="email" id="regEmail" placeholder="Correo electrónico" required>
                <input type="password" id="regPass" placeholder="Contraseña" required>
                <button type="submit" class="btn-signup">Crear cuenta</button>
            </form>
        </div>
    </div>

    <div id="uploadModal" class="modal-overlay">
        <div class="modal-content upload-box">
            <span class="close" onclick="cerrarModal('uploadModal')">&times;</span>
            <h2>Subir a RobinHud</h2>
            <div class="upload-grid">
                <div class="preview-zone"><img id="previewImg" src=""></div>
                <div class="form-zone">
                    <input type="text" id="pinTitle" placeholder="Título">
                    <button class="btn-signup" id="publishBtn">Publicar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="detailModal" class="modal-overlay">
        <div class="modal-content detail-box">
            <span class="close" onclick="cerrarModal('detailModal')">&times;</span>
            <div class="modal-body">
                <img id="detImg" src="">
                <div class="modal-text">
                    <h2 id="detTitle"></h2>
                    <p id="detUser"></p>
                    <button class="btn-signup" onclick="cerrarModal('detailModal')">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" hidden accept="image/*">

    <script src="script.js"></script>
</body>
</html>
